name: Deploy Clips Wiki to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Clips content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: clips

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz Dependencies
        working-directory: quartz
        run: npm ci

      - name: Setup Quartz Configuration
        run: |
          cp clips/quartz.config.ts quartz/
          cp clips/quartz.layout.ts quartz/

      - name: Setup Content Directory
        run: |
          mkdir -p quartz/content
          cp clips/index.md quartz/content/index.md

          # 复制 Wiki 子目录
          cp -r clips/wiki/entities quartz/content/entities
          cp -r clips/wiki/topics quartz/content/topics
          cp -r clips/wiki/comparisons quartz/content/comparisons
          cp -r clips/wiki/outputs quartz/content/outputs 2>/dev/null || true

          # 复制 raw 文章
          cp -r clips/raw quartz/content/raw

          # 创建 wiki 子目录链接
          mkdir -p quartz/content/wiki
          cd quartz/content/wiki
          ln -s ../entities entities
          ln -s ../topics topics
          ln -s ../comparisons comparisons

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build -d content

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4